<div class="max-w-7xl mx-auto py-8">
  <h1 class="mb-6 text-3xl font-bold text-gray-900">Панель администратора</h1>

  <app-loading-state
    [loading]="loading()"
    [error]="error()"
    [showRetry]="true"
    (retry)="loadStatistics()"
  />

  @if (platformStats()) {
    <div class="mb-6 flex gap-6">
      @for (stat of statisticsCards(); track stat.label) {
        <app-statistic-card [icon]="stat.icon" [value]="stat.value" [label]="stat.label" />
      }
    </div>

    <section>
      <h2 class="mb-4 text-2xl font-semibold text-gray-900">Быстрые действия</h2>
      <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
        <app-button
          icon="users"
          variant="ghost"
          size="md"
          label="Управление пользователями"
          [fullWidth]="true"
          (clicked)="navigateToUsers()"
        />
        <app-button
          icon="book"
          variant="ghost"
          size="md"
          label="Управление курсами"
          [fullWidth]="true"
          (clicked)="navigateToCourses()"
        />
      </div>
    </section>
  }
</div>
