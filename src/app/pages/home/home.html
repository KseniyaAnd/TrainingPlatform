<app-banner
  title="Развивайте реальные навыки с практическими курсами"
  subtitle="Изучайте новые технологии и инструменты через короткие уроки от опытных преподавателей. Получайте знания, которые можно сразу применить в работе."
  ctaText="Смотреть курсы"
  link="/courses"
  imageUrl="/banner-hero.png"
/>

<div class="mx-auto max-w-7xl py-8">
  <app-loading-state [loading]="loading()" [error]="error()" />

  <app-ai-features />

  @for (section of courseSections(); track section.title) {
    <app-course-section
      [title]="section.title"
      [description]="section.description"
      [courses]="section.courses"
      [showMoreLink]="true"
      [moreLinkText]="section.moreLinkText"
      [moreLinkUrl]="section.moreLinkUrl"
      [moreLinkQueryParams]="section.queryParams ?? {}"
    />
  }
</div>
