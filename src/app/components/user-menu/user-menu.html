<div class="flex items-center gap-2 shrink-0">
  @if (!isAuthenticated()) {
    <app-button variant="outlined" size="sm" routerLink="/login" label="Войти"> </app-button>
    <app-button variant="primary" size="sm" routerLink="/register" label="Зарегистрироваться">
    </app-button>
  } @else {
    @if (isAdmin()) {
      <app-button variant="ghost" size="sm" routerLink="/admin" label="Админ панель"> </app-button>
    }

    <app-button
      variant="ghost"
      size="sm"
      [routerLink]="['/courses']"
      [queryParams]="{ scope: 'me' }"
      label="Мои курсы"
    >
    </app-button>

    <div class="flex items-center gap-1.5 px-1.5">
      <i class="pi pi-user text-gray-600 text-sm"></i>
      <span class="text-sm text-gray-700">{{ username() || 'User' }}</span>
    </div>

    <app-button variant="ghost" size="sm" (clicked)="logout()" label="Выйти"> </app-button>
  }
</div>
