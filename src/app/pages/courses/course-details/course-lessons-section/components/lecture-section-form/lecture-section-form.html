<form class="mt-4 flex flex-col gap-4" [formGroup]="formService.form" (ngSubmit)="submit()">
  <div class="flex flex-col gap-2">
    <label for="section-title" class="text-sm font-medium text-gray-700"
      >Название отдела лекций</label
    >
    <input
      id="section-title"
      type="text"
      formControlName="title"
      placeholder="Введите название отдела (например: Введение, Основы, Практика)"
      class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
    />
  </div>

  <div class="flex flex-col gap-2">
    <label for="section-content" class="text-sm font-medium text-gray-700"
      >Описание отдела (необязательно)</label
    >
    <textarea
      id="section-content"
      formControlName="content"
      placeholder="Общее описание раздела, цели, вступление..."
      rows="3"
      class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-vertical"
    ></textarea>
  </div>

  <div class="flex gap-2">
    <app-button
      type="submit"
      variant="primary"
      size="md"
      label="Сохранить отдел"
      [disabled]="formService.submitting()"
    />
    <app-button type="button" variant="outlined" size="md" label="Отмена" (clicked)="cancel()" />
  </div>
</form>
