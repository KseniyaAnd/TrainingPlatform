<div class="max-w-7xl mx-auto py-8">
  <app-back-button label="Назад" [route]="'/admin'" />

  <h1 class="mb-6 text-3xl font-bold text-gray-900">Управление пользователями</h1>

  <app-role-filter
    class="mb-6 block"
    [selectedRole]="selectedRole()"
    (roleChanged)="filterByRole($event)"
  />

  <app-loading-state
    [loading]="loading()"
    [error]="error()"
    [isEmpty]="!users()?.length"
    [loadingText]="'Загрузка пользователей...'"
    [emptyText]="'Пользователи не найдены'"
    [emptyIcon]="'pi pi-users'"
    [showRetry]="true"
    (retry)="loadUsers()"
  />

  @if (users()?.length) {
    <p-table [value]="users()!" styleClass="p-datatable-sm w-full">
      <ng-template pTemplate="header">
        <tr>
          <th>Имя пользователя</th>
          <th>Email</th>
          <th>Роль</th>
          <th>Дата регистрации</th>
          <th>Действия</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-user>
        <tr>
          <td>
            <span class="font-medium">{{ user.username }}</span>
          </td>
          <td>{{ user.email }}</td>
          <td>
            <p-tag [value]="getRoleLabel(user.role)" [severity]="getRoleSeverity(user.role)" />
          </td>
          <td>{{ user.createdAt | formatDate }}</td>
          <td>
            <app-button
              icon="eye"
              variant="ghost"
              size="md"
              label="Детали"
              (clicked)="viewUserDetails(user.id)"
            />
          </td>
        </tr>
      </ng-template>
    </p-table>
  }
</div>
