<header class="sticky top-0 z-50 bg-white border-b border-gray-200">
  <div class="flex items-center gap-3 h-20 px-6">
    <!-- Logo -->
    <a routerLink="/" class="text-xl font-bold text-gray-900 no-underline shrink-0">
      LearningPlatform
    </a>

    <!-- Explore Button -->
    <p-button
      label="Все курсы"
      [text]="true"
      size="small"
      (onClick)="onExplore()"
      styleClass="!border-b !border-b-transparent !bg-transparent hover:!border-b-teal-400 !rounded-none transition-colors"
    />

    <!-- Search -->
    <div class="relative flex-1 min-w-0 px-2">
      <div class="relative">
        <input
          pInputText
          type="text"
          [ngModel]="search()"
          (ngModelChange)="onSearchInput($event)"
          (focus)="onFocus()"
          (blur)="closeSuggestions()"
          placeholder="Поиск курсов"
          class="w-full h-9 rounded-full pr-10 bg-gray-100 border border-gray-300 text-sm outline-none focus:border-teal-400 transition peer"
        />
        <i
          class="pi pi-search absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm pointer-events-none transition-colors"
          [class.text-teal-400]="showSuggestions()"
        ></i>
      </div>

      <!-- Suggestions Dropdown -->
      @if (hasSuggestions()) {
        <div
          class="absolute top-[calc(100%+8px)] left-0 right-0 bg-white border border-gray-200 rounded-xl shadow-xl overflow-hidden z-60"
          (mousedown)="$event.preventDefault()"
        >
          @for (course of suggestions(); track course.id) {
            <button
              type="button"
              (click)="openCourse(course)"
              class="w-full text-left px-3 py-2.5 bg-white hover:bg-gray-50 transition-colors cursor-pointer border-none"
            >
              <span class="text-sm font-semibold text-gray-900">
                {{ course.title }}
              </span>
            </button>
          }

          <button
            type="button"
            (click)="openAllResults()"
            class="w-full text-left px-3 py-2.5 bg-gray-50 hover:bg-gray-100 border-t border-gray-200 font-semibold text-sm text-gray-900 transition-colors cursor-pointer"
          >
            Показать все результаты по "{{ search().trim() }}"
          </button>
        </div>
      }
    </div>

    <!-- Auth Controls -->
    <div class="flex items-center gap-2 shrink-0">
      @if (!isAuthenticated()) {
        <a routerLink="/login">
          <p-button
            label="Войти"
            [outlined]="true"
            size="small"
            styleClass="!bg-white !border-teal-400 !text-teal-400 hover:!bg-teal-50"
          />
        </a>
        <a routerLink="/register">
          <p-button label="Зарегестрироваться" size="small" />
        </a>
      } @else {
        <a [routerLink]="['/courses']" [queryParams]="{ scope: 'me' }">
          <p-button
            label="Мои курсы"
            [text]="true"
            size="small"
            styleClass="!border-b !border-b-transparent !bg-transparent hover:!border-b-teal-400 !rounded-none transition-colors"
          />
        </a>

        <span class="text-sm text-gray-700 px-1.5">
          {{ username() || 'User' }}
        </span>

        <p-button
          label="Выйти"
          [text]="true"
          size="small"
          (onClick)="logout()"
          styleClass="!border-teal-400"
        />
      }
    </div>
  </div>
</header>
