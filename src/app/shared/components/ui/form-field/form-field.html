<div class="flex flex-col gap-1">
  <label [for]="id()" class="text-sm font-medium text-gray-800">
    {{ label() }}
    @if (required()) {
      <span class="text-red-500 ml-1">*</span>
    }
  </label>
  <ng-content />
  @if (error()) {
    <span class="text-xs text-red-600">{{ error() }}</span>
  }
  @if (hint() && !error()) {
    <span class="text-xs text-gray-500">{{ hint() }}</span>
  }
</div>
