<div class="mx-auto max-w-7xl py-8">
  <app-back-button label="Назад к курсу" />

  <h1 class="mb-6 text-3xl font-semibold text-gray-900">Оценка выполненных заданий</h1>

  <app-loading-state
    [loading]="state.loading() && !state.submissions().length"
    [error]="state.error()"
    [isEmpty]="!state.submissions().length"
    [loadingText]="'Загрузка работ...'"
    [emptyText]="'Пока нет работ'"
    [emptyIcon]="'pi pi-inbox'"
    [showRetry]="false"
  />

  @if (state.submissions().length) {
    <p-table [value]="state.submissions()">
      <ng-template pTemplate="header">
        <tr>
          <th>ID студента</th>
          <th>Ответ</th>
          <th>Оценка</th>
          <th>Дата отправки</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-submission>
        <tr
          app-submission-row
          [submission]="submission"
          [isEditing]="state.editingSubmissionId() === submission.id"
          [disabled]="state.loading()"
          (edit)="startEditing(submission.id)"
          (save)="saveGrade(submission.id, $event)"
          (cancel)="cancelEditing()"
        ></tr>
      </ng-template>
    </p-table>

    @if (state.hasMore()) {
      <div class="mt-6 flex justify-center border-t border-gray-200 pt-6">
        <app-button icon="refresh" [loading]="state.loading()" (clicked)="loadMore()">
          Загрузить ещё
        </app-button>
      </div>
    }
  }
</div>
