<div class="relative" [class.px-12]="showArrows()" [class.md:px-14]="showArrows()">
  @if (showArrows()) {
    <app-button
      [icon]="'chevron-left'"
      variant="ghost"
      size="md"
      [iconOnly]="true"
      class="glider-prev absolute left-0 top-1/2 z-10 -translate-y-1/2"
      [ariaLabel]="'Previous'"
    />
  }

  <div class="glider overflow-hidden" #gliderElement>
    @for (item of items(); track $index) {
      <div>
        @if (isCourse(item)) {
          <div
            class="w-[350px]"
            (click)="clickable() ? onCourseClick(item, $event) : null"
            [class.cursor-pointer]="clickable()"
          >
            <app-course-card [course]="item" [clickable]="clickable()" />
          </div>
        } @else {
          <div
            (click)="onMoreLinkClick($event)"
            class="flex h-[120px] w-[350px] cursor-pointer flex-col items-center justify-center gap-4 rounded-lg border-2 border-dashed border-primary-400 bg-primary-100 p-3 transition-all hover:border-primary-500 hover:bg-primary-200"
          >
            <i class="pi pi-arrow-right text-3xl text-primary-400"></i>
            <span class="text-center text-sm font-semibold text-primary-700">
              {{ moreLinkText() }}
            </span>
          </div>
        }
      </div>
    }
  </div>

  @if (showArrows()) {
    <app-button
      [icon]="'chevron-right'"
      variant="ghost"
      size="md"
      [iconOnly]="true"
      class="glider-next absolute right-0 top-1/2 z-10 -translate-y-1/2"
      [ariaLabel]="'Next'"
    />
  }

  @if (showDots()) {
    <div class="glider-dots mt-5 flex justify-center gap-2"></div>
  }
</div>
