<div class="max-w-7xl mx-auto">
  <h1 class="text-3xl font-semibold">My courses</h1>
  <p class="mt-2 text-gray-600">Courses you are subscribed to:</p>

  @if (error()) {
    <div class="mt-4 text-red-600">{{ error() }}</div>
  }

  @if (loading() && items().length === 0) {
    <div class="mt-4 text-gray-600">Loading...</div>
  }

  @if (!loading() && !error() && items().length === 0) {
    <div class="mt-4 text-gray-600">No courses yet</div>
  }

  <div class="mt-6 grid gap-4 lg:grid-cols-2">
    @for (course of items(); track course.id) {
      <div
        class="contents"
        role="link"
        tabindex="0"
        (click)="openCourse(course)"
        (keydown.enter)="openCourse(course)"
        (keydown.space)="openCourse(course)"
      >
        <app-course-card [course]="course"></app-course-card>
      </div>
    }
  </div>

  @if (nextCursor()) {
    <div class="mt-6">
      <button
        type="button"
        class="px-4 py-2 rounded border border-gray-300 hover:bg-gray-50 disabled:opacity-60"
        [disabled]="loading()"
        (click)="loadMore()"
      >
        {{ loading() ? 'Loading...' : 'Load more' }}
      </button>
    </div>
  }
</div>
