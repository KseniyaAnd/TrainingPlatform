<div class="flex items-center justify-center bg-white px-4 py-8 min-h-screen">
  <div class="w-full max-w-md">
    <div class="flex flex-col gap-1 mb-6">
      <h1 class="text-2xl font-semibold text-gray-900">Добро пожаловать!</h1>
      <p class="text-sm text-gray-400">Зарегистрируйте свой аккаунт</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">
      <app-form-field
        id="username"
        label="Имя пользователя"
        [required]="true"
        [error]="
          (submitted() || form.controls.username.touched) && form.controls.username.invalid
            ? 'Имя пользователя: минимум 3 символа, только латинские буквы/цифры, без пробелов'
            : null
        "
      >
        <input
          id="username"
          pInputText
          formControlName="username"
          class="w-full"
          autocomplete="username"
          placeholder="Введите имя пользователя"
        />
      </app-form-field>

      <app-form-field
        id="email"
        label="Электронная почта"
        [required]="true"
        [error]="
          (submitted() || form.controls.email.touched) && form.controls.email.invalid
            ? 'Введите корректный email'
            : null
        "
      >
        <input
          id="email"
          pInputText
          formControlName="email"
          class="w-full"
          autocomplete="email"
          placeholder="имя@example.com"
        />
      </app-form-field>

      <app-form-field
        id="password"
        label="Пароль"
        [required]="true"
        [error]="
          (submitted() || form.controls.password.touched) && form.controls.password.invalid
            ? 'Пароль обязателен (минимум 8 символов)'
            : null
        "
      >
        <p-password
          inputId="password"
          formControlName="password"
          [toggleMask]="true"
          [feedback]="true"
          styleClass="w-full"
          inputStyleClass="w-full"
          autocomplete="new-password"
          placeholder="Создайте пароль"
        ></p-password>
      </app-form-field>

      <app-form-field
        id="confirmPassword"
        label="Повторите пароль"
        [required]="true"
        [error]="
          (submitted() || form.controls.confirmPassword.touched) &&
          (form.controls.confirmPassword.invalid || form.hasError('passwordMismatch'))
            ? form.hasError('passwordMismatch')
              ? 'Пароли не совпадают'
              : 'Повторите пароль (минимум 8 символов)'
            : null
        "
      >
        <p-password
          inputId="confirmPassword"
          formControlName="confirmPassword"
          [toggleMask]="true"
          [feedback]="false"
          styleClass="w-full"
          inputStyleClass="w-full"
          autocomplete="new-password"
          placeholder="Повторите пароль"
        ></p-password>
      </app-form-field>

      <app-form-field
        id="role"
        label="Роль"
        [required]="true"
        [error]="
          (submitted() || form.controls.role.touched) && form.controls.role.invalid
            ? 'Роль обязательна'
            : null
        "
      >
        <p-select
          inputId="role"
          formControlName="role"
          [options]="roles"
          optionLabel="label"
          optionValue="value"
          placeholder="Выберите роль"
          styleClass="w-full"
        ></p-select>
      </app-form-field>

      @if (submitError()) {
        <div class="text-xs text-red-600">{{ submitError() }}</div>
      }

      <div class="flex flex-col gap-2 mt-2">
        <app-button
          type="submit"
          variant="primary"
          size="md"
          [fullWidth]="true"
          [disabled]="loading()"
          label="Зарегистрироваться"
        >
        </app-button>
        <app-button
          variant="outlined"
          size="md"
          [fullWidth]="true"
          routerLink="/login"
          label="Войти"
        >
        </app-button>
      </div>
    </form>
  </div>
</div>
