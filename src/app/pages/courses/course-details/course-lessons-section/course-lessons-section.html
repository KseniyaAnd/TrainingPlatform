<section>
  @if (isStudent()) {
    <app-student-lessons-view
      [courseId]="courseId()"
      [lessons]="lessons()"
      [courseProgress]="courseProgress()"
      [studentAssessments]="studentAssessments()"
      [submissions]="submissions()"
      (submissionsChange)="submissionsChange.emit($event)"
      (progressUpdated)="progressUpdated.emit()"
    />
  } @else if (canEditCourse()) {
    <app-teacher-lessons-view
      [courseId]="courseId()"
      [lessons]="lessons()"
      [courseLevelEditMode]="courseLevelEditMode()"
      [assessments]="assessments()"
      (lessonsChange)="lessonsChange.emit($event)"
      (assessmentsChange)="assessmentsChange.emit($event)"
    />
  }
</section>
