<form class="flex flex-col gap-3" [formGroup]="formService.form" (ngSubmit)="submit()">
  <div class="flex flex-col gap-2">
    <label [for]="'lecture-title-' + lessonId()" class="text-sm font-medium text-gray-700"
      >Название лекции</label
    >
    <input
      [id]="'lecture-title-' + lessonId()"
      type="text"
      formControlName="title"
      placeholder="Введите название лекции"
      class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
    />
  </div>

  <div class="flex flex-col gap-2">
    <label [for]="'lecture-video-' + lessonId()" class="text-sm font-medium text-gray-700"
      >Видео URL (если заполняешь, текст должен быть пустым)</label
    >
    <input
      [id]="'lecture-video-' + lessonId()"
      type="text"
      formControlName="videoUrl"
      placeholder="https://..."
      class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent"
    />
  </div>

  <div class="flex flex-col gap-2">
    <label [for]="'lecture-content-' + lessonId()" class="text-sm font-medium text-gray-700"
      >Текст лекции (если заполняешь, видео должно быть пустым)</label
    >
    <textarea
      [id]="'lecture-content-' + lessonId()"
      formControlName="content"
      placeholder="Введите текст лекции"
      rows="4"
      class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent resize-vertical"
    ></textarea>
  </div>

  <div class="flex gap-2">
    <button
      pButton
      type="submit"
      label="Сохранить лекцию"
      [style]="'background-color: #10b981; border-color: #10b981;'"
      [disabled]="formService.submitting()"
    ></button>
    <button
      pButton
      type="button"
      label="Отмена"
      severity="secondary"
      [outlined]="true"
      (click)="cancel()"
    ></button>
  </div>
</form>
