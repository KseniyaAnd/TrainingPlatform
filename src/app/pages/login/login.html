<div class="flex items-center justify-center bg-white px-4 py-8 min-h-screen">
  <div class="w-full max-w-md">
    <div class="flex flex-col gap-1 mb-6">
      <h1 class="text-2xl font-semibold text-gray-900">Добро пожаловать!</h1>
      <p class="text-sm text-gray-400">Войдите в свой аккаунт</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">
      <app-form-field
        id="username"
        label="Имя пользователя"
        [required]="true"
        [error]="
          (submitted() || form.controls.username.touched) && form.controls.username.invalid
            ? 'Имя пользователя обязательно'
            : null
        "
      >
        <input
          id="username"
          pInputText
          formControlName="username"
          class="w-full"
          autocomplete="username"
          placeholder="Введите имя пользователя"
        />
      </app-form-field>

      <app-form-field
        id="password"
        label="Пароль"
        [required]="true"
        [error]="
          (submitted() || form.controls.password.touched) && form.controls.password.invalid
            ? 'Пароль обязателен (минимум 8 символов)'
            : null
        "
      >
        <p-password
          inputId="password"
          formControlName="password"
          [toggleMask]="true"
          [feedback]="false"
          styleClass="w-full"
          inputStyleClass="w-full"
          autocomplete="current-password"
          placeholder="Введите пароль"
        ></p-password>
      </app-form-field>

      @if (submitError()) {
        <div class="text-xs text-red-600">{{ submitError() }}</div>
      }

      <div class="flex flex-col gap-2 mt-2">
        <app-button
          type="submit"
          variant="primary"
          size="md"
          [fullWidth]="true"
          [disabled]="loading()"
          label="Войти"
        >
        </app-button>
        <app-button
          variant="outlined"
          size="md"
          [fullWidth]="true"
          routerLink="/register"
          label="Зарегистрироваться"
        >
        </app-button>
      </div>
    </form>
  </div>
</div>
