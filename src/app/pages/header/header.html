<header class="sticky top-0 z-50 bg-white border-b border-gray-200">
  <div style="height: 80px; padding: 0 24px">
    <div style="height: 100%; display: flex; align-items: center; gap: 12px">
      <a
        routerLink="/"
        style="font-weight: 700; font-size: 20px; color: #1a1a1a; text-decoration: none"
      >
        udemy
      </a>

      <button
        pButton
        type="button"
        class="p-button-text p-button-sm"
        label="Explore"
        (click)="onExplore()"
      ></button>

      <div style="flex: 1; min-width: 0; padding: 0 8px">
        <div style="position: relative; width: 100%">
          <input
            pInputText
            type="text"
            [ngModel]="search()"
            (ngModelChange)="onSearchInput($event)"
            (focus)="onSearchInput(search())"
            (blur)="closeSuggestions()"
            placeholder="Search for anything"
            style="
              width: 100%;
              height: 35px;
              border-radius: 999px;
              padding: 0 48px 0 16px;
              background: #f3f4f6;
              border: 1px solid #d1d5db;
              box-sizing: border-box;
              outline: none;
              font-size: 14px;
            "
          />
          <span
            style="
              position: absolute;
              right: 16px;
              top: 50%;
              transform: translateY(-50%);
              display: flex;
              align-items: center;
              pointer-events: none;
            "
          >
            <i class="pi pi-search" style="color: #4b5563; font-size: 14px"></i>
          </span>

          @if (showSuggestions() && search().trim().length > 0) {
            <div
              style="
                position: absolute;
                top: calc(100% + 8px);
                left: 0;
                right: 0;
                background: white;
                border: 1px solid #e5e7eb;
                border-radius: 12px;
                overflow: hidden;
                box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
                z-index: 60;
              "
              (mousedown)="$event.preventDefault()"
            >
              @for (course of suggestions(); track course.id) {
                <button
                  type="button"
                  (click)="openCourse(course)"
                  style="
                    width: 100%;
                    text-align: left;
                    padding: 10px 12px;
                    border: none;
                    background: white;
                    cursor: pointer;
                  "
                >
                  <div style="font-size: 14px; color: #111827; font-weight: 600">
                    {{ course.title }}
                  </div>
                </button>
              }

              <button
                type="button"
                (click)="openAllResults()"
                style="
                  width: 100%;
                  text-align: left;
                  padding: 10px 12px;
                  border: none;
                  border-top: 1px solid #e5e7eb;
                  background: #f9fafb;
                  cursor: pointer;
                  font-weight: 600;
                  color: #111827;
                "
              >
                Show all results for "{{ search().trim() }}"
              </button>
            </div>
          }
        </div>
      </div>

      <div style="display: flex; align-items: center; gap: 8px">
        @if (!isAuthenticated()) {
          <a routerLink="/login">
            <button
              pButton
              type="button"
              style="border-color: currentColor"
              class="p-button-outlined p-button-sm !bg-white !border !text-gray-900 hover:!bg-gray-50"
              label="Log in"
            ></button>
          </a>
          <a routerLink="/register">
            <button pButton type="button" class="p-button-sm" label="Sign up"></button>
          </a>
        } @else {
          @if (role() === 'TEACHER') {
            <a [routerLink]="['/courses']" [queryParams]="{ scope: 'me' }">
              <button
                pButton
                type="button"
                class="p-button-text p-button-sm"
                label="My courses"
              ></button>
            </a>
          } @else {
            <a [routerLink]="['/courses']" [queryParams]="{ scope: 'me' }">
              <button
                pButton
                type="button"
                class="p-button-text p-button-sm"
                label="My courses"
              ></button>
            </a>
          }
          <span style="font-size: 14px; color: #374151; padding: 0 6px">
            {{ username() || 'User' }}
          </span>
          <button
            pButton
            type="button"
            class="p-button-text p-button-sm"
            label="Profile"
            disabled="true"
          ></button>
          <button
            pButton
            type="button"
            class="p-button-text p-button-sm"
            label="Log out"
            (click)="logout()"
          ></button>
        }
      </div>
    </div>
  </div>
</header>
