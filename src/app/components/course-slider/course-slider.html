<div [class]="showArrows() ? 'relative px-12 md:px-14' : 'relative'">
  @if (showArrows()) {
    <button
      class="glider-prev absolute left-0 top-1/2 z-10 flex size-10 -translate-y-1/2 items-center justify-center rounded-full border-2 border-teal-500 bg-teal-50 text-teal-600 transition-all hover:bg-teal-100 hover:text-teal-700 disabled:cursor-not-allowed disabled:opacity-30"
      aria-label="Previous"
    >
      <i class="pi pi-chevron-left"></i>
    </button>
  }

  <div class="glider overflow-hidden" #gliderElement>
    @for (item of items(); track $index) {
      <div>
        @if (isCourse(item)) {
          <div
            (click)="clickable() ? onCourseClick(item, $event) : null"
            [class.cursor-pointer]="clickable()"
          >
            <app-course-card [course]="item" [clickable]="clickable()" />
          </div>
        } @else {
          <div
            (click)="onMoreLinkClick($event)"
            class="more-link-card flex h-[120px] w-[350px] cursor-pointer flex-col items-center justify-center gap-4 rounded-lg border-2 border-dashed p-3 transition-all"
          >
            <i class="more-link-icon pi pi-arrow-right text-3xl"></i>
            <span class="more-link-text text-center text-sm font-semibold">
              {{ moreLinkText() }}
            </span>
          </div>
        }
      </div>
    }
  </div>

  @if (showArrows()) {
    <button
      class="glider-next absolute right-0 top-1/2 z-10 flex size-10 -translate-y-1/2 items-center justify-center rounded-full border-2 border-teal-500 bg-teal-50 text-teal-600 transition-all hover:bg-teal-100 hover:text-teal-700 disabled:cursor-not-allowed disabled:opacity-30"
      aria-label="Next"
    >
      <i class="pi pi-chevron-right"></i>
    </button>
  }

  @if (showDots()) {
    <div class="glider-dots mt-5 flex justify-center gap-2"></div>
  }
</div>
