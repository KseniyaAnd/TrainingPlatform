<div class="flex items-center gap-2 shrink-0">
  @if (!isAuthenticated()) {
    <a routerLink="/login">
      <p-button
        label="Войти"
        [outlined]="true"
        size="small"
        styleClass="!bg-white !border-teal-400 !text-teal-400 hover:!bg-teal-50"
      />
    </a>
    <a routerLink="/register">
      <p-button label="Зарегестрироваться" size="small" />
    </a>
  } @else {
    @if (isAdmin()) {
      <a routerLink="/admin">
        <p-button
          label="Админ панель"
          [text]="true"
          size="small"
          styleClass="!border-b !border-b-transparent !bg-transparent hover:!border-b-teal-400 !rounded-none"
        />
      </a>
    }

    <a [routerLink]="['/courses']" [queryParams]="{ scope: 'me' }">
      <p-button
        label="Мои курсы"
        [text]="true"
        size="small"
        styleClass="!border-b !border-b-transparent !bg-transparent hover:!border-b-teal-400 !rounded-none"
      />
    </a>

    <div class="flex items-center gap-1.5 px-1.5">
      <i class="pi pi-user text-gray-600 text-sm"></i>
      <span class="text-sm text-gray-700">{{ username() || 'User' }}</span>
    </div>

    <p-button
      label="Выйти"
      [text]="true"
      size="small"
      (onClick)="logout()"
      styleClass="!border-teal-400"
    />
  }
</div>
