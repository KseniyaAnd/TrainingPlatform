<div
  class="flex flex-col h-[120px] overflow-hidden rounded-md border bg-white p-3 shadow-sm transition-all hover:shadow-md"
  [class.border-primary-500]="isEnrolled"
  [class.border-gray-200]="!isEnrolled"
  [class.bg-primary-50]="isEnrolled"
  [class.cursor-pointer]="clickable"
  [routerLink]="clickable ? ['/courses', course.id] : null"
>
  <!-- Header -->
  <div class="flex items-start justify-between gap-2 mb-1">
    <h2 class="line-clamp-1 text-lg font-semibold text-gray-900 flex-1 min-w-0">
      {{ course.title }}
    </h2>
    <span class="flex-shrink-0 text-xs text-gray-500">
      {{ course.createdAt | formatDate: 'short' }}
    </span>
  </div>

  <!-- Description -->
  <p class="line-clamp-1 text-sm text-gray-700 mb-2">
    {{ course.description }}
  </p>

  <!-- Tags -->
  @if (course.tags?.length) {
    <div class="flex flex-wrap gap-1 min-h-[1.5rem] max-h-[3rem] overflow-hidden">
      @if (course.tags!.length <= 2) {
        @for (tag of course.tags!; track tag) {
          <app-tag [label]="tag" variant="primary" />
        }
      } @else {
        <app-tag [label]="course.tags![0]" variant="primary" />
        <app-tag [label]="'+' + (course.tags!.length - 1)" variant="secondary" />
      }
    </div>
  }
</div>
