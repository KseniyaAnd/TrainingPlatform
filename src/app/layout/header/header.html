<header class="sticky top-0 z-50 bg-white border-b border-gray-200">
  <div class="flex items-center gap-3 h-20 px-6">
    <!-- Logo -->
    <a routerLink="/" class="text-xl font-bold text-gray-900 no-underline shrink-0">
      LearningPlatform
    </a>

    <!-- Explore Button -->
    <p-button
      label="Все курсы"
      [text]="true"
      size="small"
      (onClick)="navigateToCourses()"
      styleClass="!border-b !border-b-transparent !bg-transparent hover:!border-b-teal-400 !rounded-none shrink-0"
    />

    <!-- Search Bar - занимает всю доступную ширину -->
    <div class="flex-1 min-w-0">
      <app-search-bar />
    </div>

    <!-- User Menu -->
    <app-user-menu />
  </div>
</header>
