<div class="relative w-full">
  <div class="relative">
    <input
      pInputText
      type="text"
      [ngModel]="search()"
      (ngModelChange)="onSearchInput($event)"
      (focus)="showSuggestions.set(true)"
      (blur)="showSuggestions.set(false)"
      placeholder="Поиск курсов"
      class="w-full h-9 rounded-full pr-10 bg-gray-100 border border-gray-300 text-sm outline-none focus:border-teal-400 transition"
    />
    <i
      class="pi pi-search absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm pointer-events-none transition-colors"
      [class.text-teal-400]="showSuggestions()"
    ></i>
  </div>

  <!-- Suggestions Dropdown -->
  @if (hasSuggestions()) {
    <div
      class="absolute top-[calc(100%+8px)] left-0 right-0 bg-white border border-gray-200 rounded-md shadow-xl overflow-hidden z-60"
      (mousedown)="$event.preventDefault()"
    >
      @for (course of suggestions(); track course.id) {
        <button
          type="button"
          (click)="selectCourse(course)"
          class="w-full text-left px-3 py-2.5 bg-white hover:bg-gray-50 transition-colors cursor-pointer border-none"
        >
          <span class="text-sm font-semibold text-gray-900">{{ course.title }}</span>
        </button>
      }

      <button
        type="button"
        (click)="showAllResults()"
        class="w-full text-left px-3 py-2.5 bg-gray-50 hover:bg-gray-100 border-t border-gray-200 font-semibold text-sm text-gray-900 transition-colors cursor-pointer"
      >
        Показать все результаты по "{{ search().trim() }}"
      </button>
    </div>
  }
</div>
