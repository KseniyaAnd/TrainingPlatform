<div
  class="py-8 bg-gradient-to-r from-primary-600 to-primary-500"
  role="region"
  aria-label="Homepage banner"
>
  <div
    class="max-w-7xl mx-auto flex items-center justify-between gap-8 text-white"
  >
    <div class="max-w-[60%]">
      <h1 class="m-0 text-4xl font-bold">{{ title() }}</h1>
      <p class="my-4 opacity-95">{{ subtitle() }}</p>
    </div>

    @if (hasImage()) {
      <img
        [ngSrc]="imageUrl()!"
        width="220"
        height="140"
        alt="Banner image"
        class="max-w-[220px] h-auto"
        priority
      />
    }
  </div>
</div>
