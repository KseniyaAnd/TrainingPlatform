<div class="flex items-center justify-center bg-white px-4 py-8 min-h-screen">
  <p-card styleClass="w-full max-w-lg shadow-lg rounded-xl px-2">
    <div class="flex flex-col gap-1 mb-6">
      <h1 class="text-2xl font-semibold text-gray-900">Создать курс</h1>
      <p class="text-sm text-gray-400">Заполните данные ниже</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">
      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-gray-800" for="title">Название</label>
        <input
          id="title"
          pInputText
          formControlName="title"
          class="w-full"
          placeholder="Название курса"
        />
        @if (form.controls.title.touched) {
          <div class="text-xs text-red-600">Название обязательно (минимум 3 символа)</div>
        }
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-gray-800" for="description">Описание</label>
        <textarea
          id="description"
          formControlName="description"
          class="w-full h-32 border border-gray-300 rounded-lg px-3 py-2.5 outline-none text-sm resize-vertical"
          rows="5"
          placeholder="Описание курса"
        ></textarea>
        @if (form.controls.description.touched) {
          <div class="text-xs text-red-600">Описание обязательно (минимум 3 символа)</div>
        }
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-gray-800" for="tags">Теги</label>
        <p-multiSelect
          inputId="tags"
          formControlName="tags"
          [options]="tagOptions"
          optionLabel="label"
          optionValue="value"
          placeholder="Выберите теги"
          selectedItemsLabel="{0} выбрано"
          styleClass="w-full"
        ></p-multiSelect>
      </div>

      @if (submitError()) {
        <div class="text-xs text-red-600">{{ submitError() }}</div>
      }

      <div class="flex flex-col gap-2 mt-2">
        <app-button
          type="submit"
          variant="primary"
          size="md"
          [fullWidth]="true"
          [disabled]="loading()"
          label="Создать"
        >
        </app-button>
        <app-button
          variant="outlined"
          size="md"
          [fullWidth]="true"
          routerLink="/courses"
          [queryParams]="{ scope: 'me' }"
          label="Отмена"
        >
        </app-button>
      </div>
    </form>
  </p-card>
</div>
