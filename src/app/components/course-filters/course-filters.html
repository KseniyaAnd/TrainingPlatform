<div class="flex flex-col gap-6">
  <!-- Tags Filter -->
  <div class="flex flex-col gap-3">
    <h3 class="text-sm font-semibold text-gray-700 m-0">Теги</h3>
    <div class="flex flex-wrap gap-2">
      <app-chip [active]="selectedTag() === null" (clicked)="selectTag(null)"> Все </app-chip>
      @for (tag of tags; track tag) {
        <app-chip [active]="selectedTag() === tag" (clicked)="selectTag(tag)">
          {{ tag }}
        </app-chip>
      }
    </div>
  </div>

  <!-- Sort Filter -->
  <div class="flex flex-col gap-3">
    <h3 class="text-sm font-semibold text-gray-700 m-0">Сортировка</h3>
    <div class="flex flex-wrap gap-2">
      @for (option of sortOptions; track option.value) {
        <app-chip [active]="selectedSort() === option.value" (clicked)="selectSort(option.value)">
          {{ option.label }}
        </app-chip>
      }
    </div>
  </div>
</div>
