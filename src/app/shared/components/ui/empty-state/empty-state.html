<div class="flex flex-col items-center justify-center py-12 px-4 text-center">
  <i [class]="'pi ' + icon() + ' text-6xl text-gray-400 mb-4'"></i>
  <h3 class="text-xl font-semibold text-gray-900 mb-2">{{ title() }}</h3>
  <p class="text-gray-600 mb-6 max-w-md">{{ message() }}</p>
  @if (actionLabel()) {
    @if (actionLink()) {
      <app-button [variant]="actionVariant()" [routerLink]="actionLink()!">
        {{ actionLabel() }}
      </app-button>
    } @else {
      <app-button [variant]="actionVariant()" (clicked)="action.emit()">
        {{ actionLabel() }}
      </app-button>
    }
  }
</div>
