<section class="mt-10">
  <div class="mb-4 flex items-end justify-between gap-4">
    <div class="max-w-4xl">
      <h2 class="text-2xl font-semibold">{{ title() }}</h2>
      @if (description()) {
        <p class="mt-2 leading-relaxed text-gray-600">{{ description() }}</p>
      }
    </div>
  </div>

  @if (courses().length > 0) {
    <app-course-slider
      [courses]="courses()"
      [showMoreLink]="showMoreLink()"
      [showDots]="false"
      [showArrows]="false"
      [clickable]="false"
      [moreLinkText]="moreLinkText()"
      [moreLinkUrl]="moreLinkUrl()"
      [moreLinkQueryParams]="moreLinkQueryParams()"
    />
  } @else if (showEmptyState()) {
    <div class="rounded-lg border border-gray-200 bg-gray-50 p-8 text-center">
      <p class="text-gray-600">{{ emptyStateText() }}</p>
    </div>
  }
</section>
